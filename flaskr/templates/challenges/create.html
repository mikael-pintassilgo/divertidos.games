{% extends 'base.html' %}

{% block content %}
<div class="">  
  <div class="">
    <form method="post">
      <fieldset class="">

        <legend class="">New Challenge</legend>
        
        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input class="form-control" type="text" aria-label="Title"
          name="title" id="title" value="{{ request.form['title'] }}" required>
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Description</label>
          <textarea class="form-control" name="description" id="description" rows="3">{{ request.form['description'] }}</textarea>
        </div>

        <div class="mb-3">
          <label for="html_text" class="form-label">HTML Text</label>
          <textarea class="form-control" name="html_text" id="html_text" rows="3">{{ request.form['html_text'] }}</textarea>
        </div>

        <div class="col-12">
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
